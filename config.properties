# Application Configuration

# Number of threads for parallel pair processing
threads=4

# Timeout for page loading and requests (in seconds)
timeout.seconds=60

# Number of retries for failing pages
retries=2

# CSS selectors to remove from the DOM before extraction (comma separated)
# Example: .live-chat, #footer-timestamp
ignore.selectors=.live-chat, #footer-timestamp

# Smart Fingerprint Cache (Feature 8)
# Set to false to always force a full re-extraction even if the page hasn't changed
cache.enabled=true
# How many hours a cached page is considered valid before re-extracting
cache.ttl.hours=24
